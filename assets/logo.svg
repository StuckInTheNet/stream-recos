<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e50914" />
      <stop offset="35%" style="stop-color:#ff6b35" />
      <stop offset="65%" style="stop-color:#1db954" />
      <stop offset="100%" style="stop-color:#6366f1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e50914" />
      <stop offset="100%" style="stop-color:#ff6b35" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="url(#bgGrad)" />

  <!-- Accent bar at bottom -->
  <rect y="192" width="800" height="8" rx="0" fill="url(#accent)" />
  <rect x="0" y="192" width="800" height="8" rx="0" fill="url(#accent)" opacity="0.6" />

  <!-- TV/Monitor icon -->
  <g transform="translate(60, 45)" filter="url(#glow)">
    <!-- TV frame -->
    <rect x="0" y="0" width="100" height="75" rx="8" fill="none" stroke="url(#iconGrad)" stroke-width="4" />
    <!-- Screen -->
    <rect x="8" y="8" width="84" height="55" rx="4" fill="url(#iconGrad)" opacity="0.15" />
    <!-- Play button on screen -->
    <polygon points="42,22 42,50 62,36" fill="url(#iconGrad)" opacity="0.9" />
    <!-- Stand -->
    <line x1="35" y1="80" x2="50" y2="90" stroke="url(#iconGrad)" stroke-width="3" stroke-linecap="round" />
    <line x1="65" y1="80" x2="50" y2="90" stroke="url(#iconGrad)" stroke-width="3" stroke-linecap="round" />
    <!-- Signal waves -->
    <path d="M 85 15 Q 95 10 100 0" fill="none" stroke="#ff6b35" stroke-width="2.5" opacity="0.7" stroke-linecap="round" />
    <path d="M 90 22 Q 100 15 108 3" fill="none" stroke="#ff6b35" stroke-width="2" opacity="0.5" stroke-linecap="round" />
    <path d="M 95 30 Q 107 20 116 6" fill="none" stroke="#ff6b35" stroke-width="1.5" opacity="0.3" stroke-linecap="round" />
  </g>

  <!-- Title -->
  <text x="200" y="100" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="58" font-weight="800" fill="#ffffff" letter-spacing="-1">
    stream<tspan fill="url(#iconGrad)">recos</tspan>
  </text>

  <!-- Tagline -->
  <text x="203" y="135" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#8888aa" font-weight="400" letter-spacing="0.5">
    Your streaming history. Smarter recommendations.
  </text>

  <!-- Subtle service dots -->
  <g transform="translate(203, 155)" opacity="0.6">
    <circle cx="0" cy="0" r="4" fill="#e50914" />
    <text x="12" y="4" font-family="'SF Pro Text', Arial, sans-serif" font-size="11" fill="#666680">Netflix</text>
    <circle cx="85" cy="0" r="4" fill="#0072d2" />
    <text x="97" y="4" font-family="'SF Pro Text', Arial, sans-serif" font-size="11" fill="#666680">Disney+</text>
    <circle cx="175" cy="0" r="4" fill="#1ce783" />
    <text x="187" y="4" font-family="'SF Pro Text', Arial, sans-serif" font-size="11" fill="#666680">Hulu</text>
    <circle cx="240" cy="0" r="4" fill="#002be7" />
    <text x="252" y="4" font-family="'SF Pro Text', Arial, sans-serif" font-size="11" fill="#666680">Max</text>
  </g>
</svg>
